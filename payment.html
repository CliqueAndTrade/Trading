<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement ClickN-Trade</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        .payment-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(29, 15, 46, 0.5));
            border: 2px solid rgba(255, 0, 110, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .payment-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .payment-header h1 {
            animation: textGlow 2s ease-in-out infinite;
        }

        .plan-summary {
            background: rgba(255, 0, 110, 0.05);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 0, 110, 0.2);
        }

        .plan-name {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .plan-price {
            font-size: 2rem;
            color: var(--accent-green);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 0, 110, 0.3);
        }

        #card-element {
            padding: 10px;
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .payment-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), #FF3385);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
        }

        .payment-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 0, 110, 0.5);
        }

        .payment-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4444;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
            display: none;
        }

        .success-message {
            color: var(--accent-green);
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 255, 65, 0.1);
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--accent-green);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: var(--accent-green);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="logo.png" alt="ClickN-Trade Logo" class="logo">
                <span class="brand-text">ClickN-Trade</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="payment-container">
            <div class="payment-header">
                <h1>Finaliser votre abonnement</h1>
                <p>Paiement sécurisé par Stripe</p>
            </div>

            <div class="plan-summary">
                <div class="plan-name" id="plan-name">Plan PRO</div>
                <div class="plan-price" id="plan-price">29.99€/mois</div>
                <div id="plan-features">
                    <p>✅ 15 paires simultanées</p>
                    <p>✅ Support prioritaire</p>
                    <p>✅ 1 Proxy statique/mois</p>
                </div>
            </div>

            <form id="payment-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" required placeholder="Jean Dupont">
                </div>

                <div class="form-group">
                    <label for="country">Pays</label>
                    <select id="country" name="country" required>
                        <option value="">Sélectionnez un pays</option>
                        <option value="FR">France</option>
                        <option value="BE">Belgique</option>
                        <option value="CH">Suisse</option>
                        <option value="LU">Luxembourg</option>
                        <option value="CA">Canada</option>
                        <option value="Other">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="card-element">Informations de paiement</label>
                    <div id="card-element"></div>
                </div>

                <div id="card-errors" class="error-message"></div>

                <button type="submit" class="payment-button" id="submit-button">
                    Payer 29.99€
                </button>

                <div class="loading" id="loading">
                    ⏳ Traitement en cours...
                </div>

                <div id="payment-success" class="success-message">
                    ✅ Paiement réussi! Bienvenue dans ClickN-Trade!
                </div>
            </form>

            <div class="back-link">
                <a href="index.html#pricing">← Retour aux tarifs</a>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACEZ PAR VOTRE CLÉ STRIPE PUBLIQUE
        // Obtenez-la sur https://dashboard.stripe.com/apikeys
        const STRIPE_PUBLIC_KEY = 'pk_test_YOUR_KEY_HERE';
        const stripe = Stripe(STRIPE_PUBLIC_KEY);
        const elements = stripe.elements();
        const cardElement = elements.create('card', {
            style: {
                base: {
                    color: '#ffffff',
                    fontFamily: '"Segoe UI", sans-serif',
                    fontSize: '16px',
                    '::placeholder': {
                        color: '#b8a9c7',
                    },
                },
                invalid: {
                    color: '#ff4444',
                },
            },
        });
        cardElement.mount('#card-element');

        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'pro';
        const billing = urlParams.get('billing') || 'monthly';

        // Données des plans
        const plans = {
            starter: { monthly: 14.99, annual: 149, name: 'STARTER', features: ['5 paires simultanées', 'Support 24/7', 'VM/VPS dédié'] },
            pro: { monthly: 29.99, annual: 299, name: 'PRO', features: ['15 paires simultanées', 'Support prioritaire', '1 Proxy statique/mois'] },
            elite: { monthly: 69.99, annual: 649, name: 'ELITE', features: ['40 paires simultanées', 'Optimisation ML personnalisée', 'Support 24/7 + consultation'] }
        };

        // Mettre à jour l'affichage du plan
        const selectedPlan = plans[plan] || plans.pro;
        const price = billing === 'annual' ? selectedPlan.annual : selectedPlan.monthly;
        const billingText = billing === 'annual' ? '/an' : '/mois';

        document.getElementById('plan-name').textContent = 'Plan ' + selectedPlan.name;
        document.getElementById('plan-price').textContent = price + '€' + billingText;
        document.getElementById('submit-button').textContent = 'Payer ' + price + '€';
        document.getElementById('plan-features').innerHTML = selectedPlan.features
            .map(f => '<p>✅ ' + f + '</p>')
            .join('');

        // Gestion des erreurs de carte
        cardElement.addEventListener('change', (event) => {
            const displayError = document.getElementById('card-errors');
            if (event.error) {
                displayError.textContent = event.error.message;
                displayError.style.display = 'block';
            } else {
                displayError.style.display = 'none';
            }
        });

        // Soumettre le paiement
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const submitButton = document.getElementById('submit-button');
            const loading = document.getElementById('loading');

            // Désactiver le bouton et afficher le chargement
            submitButton.disabled = true;
            loading.style.display = 'block';

            // ⚠️ IMPORTANT: Vous devez avoir un backend pour gérer le paiement!
            // Ceci est une démonstration simplifiée
            
            try {
                const { token } = await stripe.createToken(cardElement, {
                    name: name,
                    address_zip: '75000', // À récupérer du formulaire
                });

                if (token.error) {
                    document.getElementById('card-errors').textContent = token.error.message;
                    document.getElementById('card-errors').style.display = 'block';
                } else {
                    // Envoyer le token à votre serveur
                    const response = await fetch('/api/pay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token: token.id,
                            email: email,
                            name: name,
                            plan: plan,
                            billing: billing,
                            amount: Math.round(price * 100) // En centimes
                        })
                    });

                    if (response.ok) {
                        document.getElementById('payment-success').style.display = 'block';
                        document.getElementById('payment-form').style.display = 'none';
                    } else {
                        throw new Error('Erreur lors du paiement');
                    }
                }
            } catch (error) {
                document.getElementById('card-errors').textContent = error.message;
                document.getElementById('card-errors').style.display = 'block';
            } finally {
                submitButton.disabled = false;
                loading.style.display = 'none';
            }
        });

        console.log('💳 Page de paiement chargée');
        console.log('Plan:', plan, 'Billing:', billing, 'Price:', price);
    </script>
</body>
</html>
